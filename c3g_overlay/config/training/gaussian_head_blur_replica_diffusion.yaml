# @package _global_
# Pipeline: Frozen C3G encoder → MipSplattingRefiner → DiffusionHead → C3G decoder
# MipSplattingRefiner: per-scene test-time Gaussian optimization against blurry context views.
# DiffusionHead: flow-matching deblurrer in Gaussian attribute space (Nova3R backbone).
# Only the DiffusionHead is trained; encoder and decoder are frozen.

defaults:
  - /dataset@_group_.blur_replica: blur_replica
  - override /model/encoder: noposplat
  - override /model/encoder/backbone: croco
  - override /loss: [mse, lpips]

wandb:
  name: blur_replica_diffusion_head
  tags: [blur_replica, mip_splatting, diffusion_head, flow_matching]

model:
  encoder:
    backbone:
      name: vggt_multi
    gaussian_adapter:
      sh_degree: 0
      clamping: -1
    name: vggt
    num_gaussians: 2048
    gs_params_head_type: dpt_gs
    pose_free: true
    intrinsics_embed_loc: None
    intrinsics_embed_type: None
    pretrained_weights: '/scratch-shared/qzhang1/C3G/pretrained_weights/model.pt'
    init_points: one_point
  decoder:
    make_scale_invariant: true
    low_pass_filter: 10.0
    decrease_lpf_step: 1000
  # MipSplattingRefiner: per-scene Adam optimization before DiffusionHead.
  refiner:
    num_opt_steps: 100
    lr_xyz: 1.6e-4
    lr_scale: 5e-3
    lr_rotation: 1e-3
    lr_color: 2.5e-3
    lr_opacity: 5e-2
    low_pass_filter: 0.3
    make_scale_invariant: true
    background_color: [0.0, 0.0, 0.0]
  # DiffusionHead: flow-matching Gaussian deblurrer (Nova3R TransformerEncoder + PointJointFMDecoderV2).
  diffusion_head:
    enc_k: 256
    enc_df: 128
    enc_df_out: 128
    enc_d_point: 64
    enc_cross_depth: 4
    enc_self_depth: 2
    dec_dim_model: 64
    dec_cross_depth: 3
    dec_num_virtual: 256
    train_num_steps: 1
    infer_num_steps: 10

dataset:
  blur_replica:
    view_sampler:
      warm_up_steps: 37500
      num_context_views: 24
    samples_per_scene: 200

optimizer:
  lr: 1e-4
  warm_up_steps: 1000
  backbone_lr_multiplier: 0.01

data_loader:
  train:
    batch_size: 1

train:
  context_view_loss: true
  random_select_context_view: true
  freeze_encoder: true

trainer:
  max_steps: 150001
  val_check_interval: 1000
  accumulate_grad_batches: 2
  devices: 4
  strategy: ddp
  enable_progress_bar: true
  num_sanity_val_steps: 0
  num_nodes: 2

checkpointing:
  every_n_train_steps: 5000
  save_top_k: 5
