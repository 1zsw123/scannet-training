# @package _global_
# Finetune DA3+ReSplat+DiffusionHead on RSBlur (real motion blur, no GT poses).
#
# Key differences from Replica SOTA:
#   - use_pred_pose=True: DA3 predicts camera poses at runtime (no GT poses)
#   - Loss: image only (mse + lpips + ssim), no depth supervision
#   - Dataset: RSBlur real captures, 7 scenes

defaults:
  - /dataset@_group_.rsblur: rsblur
  - override /model/encoder: noposplat
  - override /model/encoder/backbone: croco
  - override /loss: [l1, lpips_v3, ssim]

wandb:
  name: finetune_dav3_rsblur_v3
  tags: [rsblur, diffusion_head, da3_resplat, finetune, pred_pose, lpips_v3]

model:
  encoder:
    name: da3_resplat
    da3_checkpoint: /gpfs/scratch1/shared/qzhang1/da3_pretrained/DA3-GIANT
    resplat_checkpoint: /gpfs/scratch1/shared/qzhang1/resplat_pretrained/resplat-base-dl3dv-256x448-view8-1934a04c.pth
    freeze_da3: true
    freeze_resplat: true
    use_pred_pose: true        # DA3 predicts poses — no GT poses needed
    gaussian_adapter:
      sh_degree: 3
  decoder:
    make_scale_invariant: true
    low_pass_filter: 0.3
    decrease_lpf_step: -1
  refiner: null
  diffusion_head:
    enc_k: 256
    enc_df: 128
    enc_df_out: 128
    enc_d_point: 64
    enc_cross_depth: 4
    enc_self_depth: 2
    dec_dim_model: 64
    dec_cross_depth: 3
    dec_num_virtual: 256
    train_num_steps: 3
    infer_num_steps: 3
    use_cam_cond: false        # no GT ProPE (poses are predicted, not GT)
    use_vggt_priors: true      # DA3 patch_tokens for DiffHead conditioning
    use_cam_pred: false

dataset:
  rsblur:
    view_sampler:
      warm_up_steps: 0
      num_context_views: 5   # max 5 ctx → 3 tgt; randomly 2-5 during training
      min_context_views: 2
    samples_per_scene: 200

optimizer:
  lr: 5e-5
  warm_up_steps: 500
  backbone_lr_multiplier: 0.01

data_loader:
  train:
    batch_size: 1

train:
  context_view_loss: false
  random_select_context_view: true   # 2-5 ctx random; target adapts via ::2 (1-3 GT)
  freeze_encoder: true
  depth_mode: depth
  share_weight: 0.0
  l_flow_weight: 0.0
  cam_loss_weight: 0.0

trainer:
  max_steps: 20000
  val_check_interval: 250
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  devices: 4
  strategy: ddp
  enable_progress_bar: true
  num_sanity_val_steps: 1
  num_nodes: 1

checkpointing:
  every_n_train_steps: 500
  save_top_k: -1
