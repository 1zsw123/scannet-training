# @package _global_
# Eval: VD-Diff deblurred frames → DA3-GIANT + ReSplat (frozen), deblurnerf_blur benchmark.

defaults:
  - /dataset@_group_.colmap: deblurnerf_blur_vdiff
  - override /model/encoder: noposplat
  - override /model/encoder/backbone: croco
  - override /loss: [mse, lpips]

wandb:
  name: eval_deblurnerf_blur_vdiff_dav3
  tags: [eval, vdiff, dav3_resplat, deblurnerf_blur]

model:
  encoder:
    name: da3_resplat
    da3_checkpoint: /gpfs/scratch1/shared/qzhang1/da3_pretrained/DA3-GIANT
    resplat_checkpoint: /gpfs/scratch1/shared/qzhang1/resplat_pretrained/resplat-base-dl3dv-256x448-view8-1934a04c.pth
    freeze_da3: true
    freeze_resplat: true
    gaussian_adapter:
      sh_degree: 3
  decoder:
    make_scale_invariant: true   # was false → PSNR~11 due to float32 collapse at near=0.01
    low_pass_filter: 0.3
    decrease_lpf_step: 1000
  refiner: null
  diffusion_head: null

dataset:
  colmap:
    view_sampler:
      num_context_views: 10
      min_context_views: 2

optimizer:
  lr: 1e-4
  warm_up_steps: 1

data_loader:
  train:
    batch_size: 1
  val:
    batch_size: 1

mode: test

test:
  output_path: /scratch-shared/qzhang1/eval_outputs
  align_pose: false
  compute_scores: true
  save_image: false
  save_video: false
  save_compare: false

train:
  freeze_encoder: true
  share_weight: 0.0
  context_view_loss: false

trainer:
  devices: 1
  strategy: single_device
  enable_progress_bar: true
  num_nodes: 1

checkpointing:
  every_n_train_steps: 999999
  save_top_k: 0
