# @package _global_
# DAV3 (DA3-GIANT + ReSplat + DiffusionHead) on mixed-blur TUM (paper-style protocol).

defaults:
  - /dataset@_group_.tum: tum_mixblur
  - override /model/encoder: noposplat
  - override /model/encoder/backbone: croco
  - override /loss: [mse_l1]

wandb:
  name: eval_dav3_tum_mixblur
  mode: disabled
  tags: [eval, dav3, tum, ate, mixblur]

model:
  encoder:
    name: da3_resplat
    da3_checkpoint: /gpfs/scratch1/shared/qzhang1/da3_pretrained/DA3-GIANT
    resplat_checkpoint: /gpfs/scratch1/shared/qzhang1/resplat_pretrained/resplat-base-dl3dv-256x448-view8-1934a04c.pth
    freeze_da3: true
    freeze_resplat: true
    gaussian_adapter:
      sh_degree: 3
  decoder:
    make_scale_invariant: true
    low_pass_filter: 0.3
    decrease_lpf_step: -1
  refiner: null
  diffusion_head:
    enc_k: 256
    enc_df: 128
    enc_df_out: 128
    enc_d_point: 64
    enc_cross_depth: 4
    enc_self_depth: 2
    dec_dim_model: 64
    dec_cross_depth: 3
    dec_num_virtual: 256
    train_num_steps: 3
    infer_num_steps: 3
    use_cam_cond: true
    use_vggt_priors: true
    use_cam_pred: false

dataset:
  tum:
    view_sampler:
      num_context_views: 8
      num_target_views: 8
    samples_per_scene: 5000

optimizer:
  lr: 1e-4
  warm_up_steps: 1

data_loader:
  train: { batch_size: 1 }
  val: { batch_size: 1, num_workers: 0, persistent_workers: false }
  test: { batch_size: 1, num_workers: 0 }

mode: test

test:
  output_path: /scratch-shared/qzhang1/baselines/ate_eval/dav3_test_outputs_mixblur
  align_pose: false
  compute_scores: false
  save_image: true
  save_video: false
  save_compare: false

train:
  context_view_loss: false
  freeze_encoder: true
  share_weight: 0.0

trainer:
  devices: 1
  strategy: single_device
  enable_progress_bar: true
  num_nodes: 1
  precision: bf16-mixed

checkpointing:
  load: null
  every_n_train_steps: 999999
  save_top_k: 0
