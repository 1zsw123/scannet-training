# @package _global_
# Ablation: same as gaussian_head_blur_replica_sota_dav3_resplat, but DA3
# predicts camera poses instead of consuming GT. The DiffusionHead still
# receives a 9-dim ProPE pose_enc as conditioning — only its source changes
# from GT extrinsics/intrinsics to DA3-predicted extrinsics/intrinsics.
#
# Mechanism (no code changes needed):
#   - encoder.use_pred_pose=true →
#       DA3 forward called with extrinsics=None, intrinsics=None
#       predicted W2C/intr written into context["extrinsics"/"intrinsics"] in-place
#   - model_wrapper propagates predicted context poses to target views
#       (model_wrapper.py:418-420)
#   - _compute_pose_enc(context["extrinsics"], context["intrinsics"], ...)
#       now reads predicted poses → DiffHead's context_pose_enc is predicted

defaults:
  - /dataset@_group_.blur_replica: blur_replica
  - override /model/encoder: noposplat
  - override /model/encoder/backbone: croco
  - override /loss: [mse, lpips, ssim, depth]

wandb:
  name: sota_dav3_resplat_predpose
  tags: [blur_replica, diffusion_head, da3_resplat, ablation, pred_pose]

model:
  encoder:
    name: da3_resplat
    da3_checkpoint: /gpfs/scratch1/shared/qzhang1/da3_pretrained/DA3-GIANT
    resplat_checkpoint: /gpfs/scratch1/shared/qzhang1/resplat_pretrained/resplat-base-dl3dv-256x448-view8-1934a04c.pth
    freeze_da3: true
    freeze_resplat: true
    use_pred_pose: true            # ABLATION: predicted poses replace GT
    gaussian_adapter:
      sh_degree: 3
  decoder:
    make_scale_invariant: true
    low_pass_filter: 10.0
    decrease_lpf_step: 1000
  refiner: null
  diffusion_head:
    enc_k: 256
    enc_df: 128
    enc_df_out: 128
    enc_d_point: 64
    enc_cross_depth: 4
    enc_self_depth: 2
    dec_dim_model: 64
    dec_cross_depth: 3
    dec_num_virtual: 256
    train_num_steps: 3
    infer_num_steps: 3
    use_cam_cond: true             # KEEP: pose_enc still fed; source is now predicted
    use_vggt_priors: true
    use_cam_pred: false

dataset:
  blur_replica:
    sharp_context: false
    view_sampler:
      warm_up_steps: 0
      num_context_views: 12
      min_context_views: 2
    samples_per_scene: 200

optimizer:
  lr: 3.5e-5
  warm_up_steps: 500
  backbone_lr_multiplier: 0.01

data_loader:
  train:
    batch_size: 1

train:
  context_view_loss: false
  random_select_context_view: true
  freeze_encoder: true
  depth_mode: depth
  share_weight: 0.0
  l_flow_weight: 0.0
  cam_loss_weight: 0.0

trainer:
  max_steps: 37500
  val_check_interval: 250
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  devices: 4
  strategy: ddp
  precision: bf16-mixed
  enable_progress_bar: true
  num_sanity_val_steps: 1
  num_nodes: 1

checkpointing:
  every_n_train_steps: 500
  save_top_k: -1
