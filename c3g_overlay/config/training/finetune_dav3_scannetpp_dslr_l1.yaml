# @package _global_
# Fine-tune DAV3 (DA3+ReSplat+DiffusionHead) on ScanNet++ DSLR.
# Loss: L1 (masked) + LPIPS-v3 + SSIM + depth.
# Loads from Replica SOTA 32500-step checkpoint (weights only, fresh optimizer).

defaults:
  - /dataset@_group_.scannetpp_dslr: scannetpp_dslr
  - override /model/encoder: noposplat
  - override /model/encoder/backbone: croco
  - override /loss: [mse_l1, lpips_v3, ssim, depth]

wandb:
  name: finetune_dav3_scannetpp_dslr_l1
  tags: [finetune, dav3, scannetpp, dslr, deblur, l1, curriculum]

model:
  encoder:
    name: da3_resplat
    da3_checkpoint: /gpfs/scratch1/shared/qzhang1/da3_pretrained/DA3-GIANT
    resplat_checkpoint: /gpfs/scratch1/shared/qzhang1/resplat_pretrained/resplat-base-dl3dv-256x448-view8-1934a04c.pth
    freeze_da3: true
    freeze_resplat: true
    gaussian_adapter:
      sh_degree: 3
  decoder:
    make_scale_invariant: true
    low_pass_filter: 0.3       # skip LPF warmup for fine-tuning; Replica already converged
    decrease_lpf_step: -1      # no further decrease needed
  refiner: null
  diffusion_head:
    enc_k: 256
    enc_df: 128
    enc_df_out: 128
    enc_d_point: 64
    enc_cross_depth: 4
    enc_self_depth: 2
    dec_dim_model: 64
    dec_cross_depth: 3
    dec_num_virtual: 256
    train_num_steps: 3
    infer_num_steps: 3
    use_cam_cond: true
    use_vggt_priors: true
    use_cam_pred: false

dataset:
  scannetpp_dslr:
    samples_per_scene: 100
    num_context_views: 8
    num_target_views: 4
    val_samples_file: /gpfs/scratch1/shared/qzhang1/scannetpp_processed/val_samples_scannetpp_dslr.json
    input_image_shape:
    - 288
    - 384
    original_image_shape:
    - 288
    - 432

optimizer:
  lr: 2e-5
  warm_up_steps: 200
  backbone_lr_multiplier: 0.01

data_loader:
  train:
    batch_size: 1
  val:
    batch_size: 1
    num_val_samples: 200
    num_workers: 1
    persistent_workers: false

train:
  context_view_loss: false
  random_select_context_view: true
  freeze_encoder: true
  depth_mode: depth
  share_weight: 0.0
  l_flow_weight: 0.0
  cam_loss_weight: 0.0

trainer:
  max_steps: 20000
  val_check_interval: 500
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  devices: 4
  strategy: ddp
  enable_progress_bar: true
  num_sanity_val_steps: 0
  precision: bf16-mixed
  num_nodes: 1

checkpointing:
  load: /scratch-shared/qzhang1/C3G_outputs/exp_finetune_dav3_scannetpp_dslr_l1/2026-04-28_16-07-53/checkpoints/latest-info/global_step_11999.ckpt
  every_n_train_steps: 500
  save_top_k: 1
