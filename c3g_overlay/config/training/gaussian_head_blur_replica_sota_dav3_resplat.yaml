# @package _global_
# SOTA Pipeline (final): DA3-GIANT + ReSplat → DiffusionHead
#
# Encoder: EncoderDA3ReSplat (da3_resplat)
#   Step 1: DA3-GIANT (frozen) → pixel-aligned depth + backbone tokens
#   Step 2: ReSplat (frozen) → Gaussians using DA3 depth for point lifting
# DiffusionHead (trainable): flow-matching deblurrer
#   conditioning: GT ProPE 9-dim (use_cam_cond) + DA3 patch_tokens only (use_vggt_priors)
#   cls_token NOT used — semantic only, camera geometry handled by ProPE
# No separate refiner needed — ReSplat IS the reconstruction stage.

defaults:
  - /dataset@_group_.blur_replica: blur_replica
  - override /model/encoder: noposplat
  - override /model/encoder/backbone: croco
  - override /loss: [mse, lpips, ssim, depth]

wandb:
  name: sota_dav3_resplat
  tags: [blur_replica, diffusion_head, da3_resplat, sota]

model:
  encoder:
    name: da3_resplat
    da3_checkpoint: /gpfs/scratch1/shared/qzhang1/da3_pretrained/DA3-GIANT
    resplat_checkpoint: /gpfs/scratch1/shared/qzhang1/resplat_pretrained/resplat-base-dl3dv-256x448-view8-1934a04c.pth
    freeze_da3: true
    freeze_resplat: true
    gaussian_adapter:
      sh_degree: 3
  decoder:
    make_scale_invariant: true
    low_pass_filter: 10.0
    decrease_lpf_step: 1000
  # No MipSplattingRefiner — ReSplat is the reconstruction stage
  refiner: null
  diffusion_head:
    enc_k: 256
    enc_df: 128
    enc_df_out: 128
    enc_d_point: 64
    enc_cross_depth: 4
    enc_self_depth: 2
    dec_dim_model: 64
    dec_cross_depth: 3
    dec_num_virtual: 256
    train_num_steps: 3
    infer_num_steps: 3
    use_cam_cond: true        # GT ProPE 9-dim pose_enc
    use_vggt_priors: true     # DA3 patch_tokens [B,V,N,C] only (cls_token excluded)
    use_cam_pred: false

dataset:
  blur_replica:
    sharp_context: false
    view_sampler:
      warm_up_steps: 0
      num_context_views: 12
      min_context_views: 2
    samples_per_scene: 200

optimizer:
  lr: 3.5e-5
  warm_up_steps: 500
  backbone_lr_multiplier: 0.01

data_loader:
  train:
    batch_size: 1     # DA3-GIANT + ReSplat memory intensive; effective batch=4 via accumulate

train:
  context_view_loss: false
  random_select_context_view: true
  freeze_encoder: true           # DA3 + ReSplat both frozen, only DiffHead trains
  depth_mode: depth
  share_weight: 0.0
  l_flow_weight: 0.0
  cam_loss_weight: 0.0

trainer:
  max_steps: 37500
  val_check_interval: 250
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  devices: 4
  strategy: ddp
  precision: bf16-mixed
  enable_progress_bar: true
  num_sanity_val_steps: 1
  num_nodes: 1

checkpointing:
  every_n_train_steps: 500
  save_top_k: -1
