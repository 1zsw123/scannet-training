# @package _global_
# Finetune DA3+ReSplat+DiffusionHead on GoPro defocus blur (single-view image pairs).
# Loss: L1 + LPIPS-v3 + SSIM.
# Stage 4: Replica → ScanNet++ → RSBlur → GoPro_defocus.
# Loads from final RSBlur checkpoint (load_weights_only=true).

defaults:
  - /dataset@_group_.gopro_defocus: gopro_defocus
  - override /model/encoder: noposplat
  - override /model/encoder/backbone: croco
  - override /loss: [mse_l1, lpips_v3, ssim, depth]

wandb:
  name: finetune_dav3_gopro_defocus_l1
  tags: [gopro_defocus, diffusion_head, da3_resplat, finetune, pred_pose, single_view, curriculum]

model:
  encoder:
    name: da3_resplat
    da3_checkpoint: /gpfs/scratch1/shared/qzhang1/da3_pretrained/DA3-GIANT
    resplat_checkpoint: /gpfs/scratch1/shared/qzhang1/resplat_pretrained/resplat-base-dl3dv-256x448-view8-1934a04c.pth
    freeze_da3: true
    freeze_resplat: true
    use_pred_pose: true
    gaussian_adapter:
      sh_degree: 3
  decoder:
    make_scale_invariant: true
    low_pass_filter: 0.3
    decrease_lpf_step: -1
  refiner: null
  diffusion_head:
    enc_k: 256
    enc_df: 128
    enc_df_out: 128
    enc_d_point: 64
    enc_cross_depth: 4
    enc_self_depth: 2
    dec_dim_model: 64
    dec_cross_depth: 3
    dec_num_virtual: 256
    train_num_steps: 3
    infer_num_steps: 3
    use_cam_cond: false
    use_vggt_priors: true
    use_cam_pred: false

dataset:
  gopro_defocus:
    val_ids_start: 502

optimizer:
  lr: 2e-5
  warm_up_steps: 200
  backbone_lr_multiplier: 0.01

data_loader:
  train:
    batch_size: 1
  val:
    batch_size: 1
    num_workers: 1
    persistent_workers: false

train:
  context_view_loss: false
  random_select_context_view: false
  freeze_encoder: true
  depth_mode: depth
  share_weight: 0.0
  l_flow_weight: 0.0
  cam_loss_weight: 0.0

trainer:
  max_steps: 20000
  val_check_interval: 500
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  devices: 4
  strategy: ddp
  enable_progress_bar: true
  num_sanity_val_steps: 0
  precision: bf16-mixed
  num_nodes: 1

checkpointing:
  load: null   # set to RSBlur final checkpoint after RSBlur training completes
  load_weights_only: true
  every_n_train_steps: 500
  save_top_k: 1
  save_weights_only: false

loss:
  depth:
    weight: 0.2
