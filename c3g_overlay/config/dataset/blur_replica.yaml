defaults:
  - base_dataset
  - view_sampler: bounded
  - optional view_sampler_dataset_specific_config@view_sampler: bounded_blur_replica

name: blur_replica

# 每个 root 是一个场景的父目录（内部有同名子目录，如 office_3/office_3/）
roots:
  - /scratch-shared/qzhang1/datasets/office_3
  - /scratch-shared/qzhang1/datasets/office_4
  - /scratch-shared/qzhang1/datasets/room_0
  - /scratch-shared/qzhang1/datasets/room_1
  - /scratch-shared/qzhang1/datasets/room_2

# Blur/sharp 目录结构
blur_dir: blur_36
traj_file: traj_8.txt

# 相机内参 —— Replica 标准值 (1200×680)
fx: 600.0
fy: 600.0
cx: 599.5
cy: 339.5
original_width: 1200
original_height: 680

# 渲染范围 (Replica 室内场景)
near: 0.01
far: 10.0

# 输入分辨率 (C3G 标准) — encoder 处理的分辨率，保持 2:1 宽高比
input_image_shape: [416, 736]
# 输出分辨率 — target GT 图和 decoder 渲染的分辨率，loss 在此尺寸计算
output_image_shape: [416, 736]
original_image_shape: [680, 1200]
cameras_are_circular: false

baseline_min: 1e-3
baseline_max: 1e10
max_fov: 120.0
skip_bad_shape: false

# 空列表 = 自动发现所有场景
scene_list: []

# true = 锐利帧→锐利帧 (baseline); false = 模糊帧→锐利帧 (deblur训练)
sharp_context: true

# 每个场景每epoch采样次数
samples_per_scene: 100

# GT depth maps directory (generated by scripts/generate_depth_maps.py)
# Set to empty string to disable depth loading
depth_dir: depth

# 其他标志
make_baseline_1: false
augment: false
relative_pose: true
